<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FH6 Heatmap</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="heatmap-page">
    <div class="heatmap-header">
      <div class="heatmap-header__title">FH6 Density Heatmap</div>
      <div class="heatmap-header__stats">
        <div class="stat">
          <span class="stat__label">Points Loaded</span>
          <span class="stat__value"><span id="pointsLoaded">0</span></span>
        </div>
        <div class="stat">
          <span class="stat__label">Total</span>
          <span class="stat__value"><span id="pointsTotal">0</span></span>
        </div>
        <div class="stat">
          <span class="stat__label">Status</span>
          <span class="stat__value" id="loadStatus">Loading...</span>
        </div>
      </div>
      <a href="/" class="heatmap-header__back">Back to Live Map</a>
    </div>
    <div id="progressBar" class="progress-bar">
      <div id="progressFill" class="progress-bar__fill"></div>
    </div>
    <div id="mapCanvas" aria-label="FH6 heatmap"></div>
    <script type="module" src="/js/heatmap.js"></script>
  </body>
</html>
