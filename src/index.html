<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FH6 Live Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background: #0f172a;
        color: #f1f5f9;
      }

      body {
        display: flex;
        flex-direction: column;
      }

      #mapCanvas {
        flex: 1;
        width: 100%;
        height: 100%;
      }

      .header {
        background: rgba(15, 23, 42, 0.95);
        border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        padding: 12px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .header__title {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .header__stats {
        display: flex;
        gap: 24px;
        font-size: 13px;
      }

      .header__controls {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .unit-toggle {
        display: inline-flex;
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 999px;
        overflow: hidden;
        background: rgba(15, 23, 42, 0.7);
      }

      .unit-toggle__button {
        appearance: none;
        border: 0;
        background: transparent;
        color: #cbd5e1;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }

      .unit-toggle__button:hover {
        background: rgba(148, 163, 184, 0.14);
      }

      .unit-toggle__button.active {
        background: #fbbf24;
        color: #0f172a;
      }

      .connection-panel {
        padding: 8px 20px;
        background: rgba(15, 23, 42, 0.92);
        border-bottom: 1px solid rgba(148, 163, 184, 0.08);
        font-size: 13px;
        color: #cbd5e1;
      }

      .connection-panel .muted {
        color: #94a3b8;
        font-size: 12px;
      }

      .stat {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .stat__label {
        color: #cbd5e1;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .stat__value {
        font-weight: 600;
        font-size: 14px;
      }

      .connection-status {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 6px;
      }

      .connection-status.connected {
        background: #10b981;
        box-shadow: 0 0 8px #10b981;
      }

      .connection-status.disconnected {
        background: #ef4444;
      }

      .follow-toggle {
        appearance: none;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: rgba(15, 23, 42, 0.7);
        color: #cbd5e1;
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.03em;
        text-transform: none;
        cursor: pointer;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
      }

      .follow-toggle:hover {
        background: rgba(148, 163, 184, 0.14);
      }

      .follow-toggle.active {
        background: #fbbf24;
        border-color: #fbbf24;
        color: #0f172a;
      }

      @media (max-width: 768px) {
        .header {
          gap: 12px;
          flex-wrap: wrap;
        }

        .header__stats {
          gap: 12px;
        }

        .header__controls {
          width: 100%;
          justify-content: flex-end;
        }

        .stat__value {
          font-size: 13px;
        }

      }
    </style>
  </head>
  <body>

    <div class="header">
      <div class="header__title">FH6 Live Map</div>
      <div class="header__controls">
        <div class="header__stats">
          <div class="stat">
            <span class="stat__label">No. Players connected</span>
            <span class="stat__value"><span id="playerCount">0</span></span>
          </div>
        </div>
        <div class="unit-toggle" role="group" aria-label="Speed units">
          <button type="button" class="unit-toggle__button active" data-speed-unit="mph" aria-pressed="true">MPH</button>
          <button type="button" class="unit-toggle__button" data-speed-unit="km" aria-pressed="false">KM/H</button>
        </div>
        <button type="button" id="followPlayerToggle" class="follow-toggle active" aria-pressed="true">Follow selected</button>
      </div>
    </div>

    <div class="connection-panel">
      <strong>Connection info:</strong>
      <span class="muted">Go to game settings → HUD & Gameplay → Telemetry. Set Data Out to </span><strong>On</strong>,
      <span class="muted">Data Out IP to </span><strong>161.33.90.28</strong>,
      <span class="muted">and Data Out IP Port to </span><strong>20441</strong>.
      <br />
      <span class="muted">If you want a custom username and map colour, download this app: </span><a href="https://cdn.reactivesli.me/programs/forza/MapClient.zip" target="_blank" rel="noopener noreferrer">MapClient.zip</a>
    </div>

    <div id="mapCanvas" aria-label="Forza live map"></div>

    

    <script type="module" src="/js/live-map.js"></script>
  </body>
</html>
